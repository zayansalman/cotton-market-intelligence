version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Dhaka
    open-pull-requests-limit: 5
    groups:
      next-react:
        patterns:
          - next
          - react
          - react-dom
          - eslint-config-next
      testing:
        patterns:
          - vitest
          - "@types/*"
      tooling:
        patterns:
          - typescript
          - tailwindcss
          - "@tailwindcss/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Dhaka
    open-pull-requests-limit: 5
