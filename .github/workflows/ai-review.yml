name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-agent-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate required AI secrets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN GitHub Actions secret is required for AI PR Review. Add it under Repository settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Build PR diff snapshot
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          git diff --unified=0 "$BASE_SHA" "$HEAD_SHA" > pr.diff
          python - <<'PY'
          from pathlib import Path
          diff = Path("pr.diff").read_text(encoding="utf-8", errors="ignore")
          # Keep token usage controlled.
          Path("pr.diff").write_text(diff[:30000], encoding="utf-8")
          PY

      - name: Generate AI review (Hugging Face)
        id: generate-review
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request
          from pathlib import Path

          diff = Path("pr.diff").read_text(encoding="utf-8", errors="ignore")
          out = Path("ai_review.md")

          def set_review_status(status: str) -> None:
              github_output = os.getenv("GITHUB_OUTPUT")
              if github_output:
                  with open(github_output, "a", encoding="utf-8") as fh:
                      fh.write(f"status={status}\n")

          if not diff.strip():
              set_review_status("skipped")
              out.write_text("", encoding="utf-8")
              raise SystemExit(0)

          if not os.getenv("HF_TOKEN"):
              raise SystemExit("HF_TOKEN GitHub Actions secret is required for AI PR Review.")

          prompt = (
              "You are an expert code reviewer. Review this PR diff with focus on:\n"
              "1) bugs/regressions\n"
              "2) edge cases\n"
              "3) security/data leakage risks\n"
              "4) performance concerns\n"
              "5) missing tests\n\n"
              "Return concise markdown with:\n"
              "- Overall risk: LOW/MEDIUM/HIGH\n"
              "- Findings (ordered by severity)\n"
              "- Suggested follow-ups\n\n"
              "If no major issue, explicitly say so.\n\n"
              f"PR diff:\n{diff}"
          )

          model = os.getenv("HF_REVIEW_MODEL", "Qwen/Qwen2.5-Coder-32B-Instruct:fastest")
          url = os.getenv("HF_REVIEW_URL", "https://router.huggingface.co/v1/chat/completions")
          payload = {
              "model": model,
              "messages": [
                  {
                      "role": "system",
                      "content": "You are a concise senior software engineer reviewing a pull request.",
                  },
                  {"role": "user", "content": prompt},
              ],
              "max_tokens": 700,
              "temperature": 0.2,
          }

          req = urllib.request.Request(
              url,
              data=json.dumps(payload).encode(),
              headers={
                  "Authorization": f"Bearer {os.environ['HF_TOKEN']}",
                  "Content-Type": "application/json",
              },
          )

          try:
              with urllib.request.urlopen(req, timeout=120) as resp:
                  raw = json.loads(resp.read())
          except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8", errors="ignore")[:1000]
              raise SystemExit(f"AI review call failed: HTTP {e.code} {body}")
          except Exception as e:
              raise SystemExit(f"AI review call failed: {e}")

          text = raw.get("choices", [{}])[0].get("message", {}).get("content", "").strip()
          if not text:
              raise SystemExit(
                  "AI review call returned an empty or unexpected payload:\n"
                  + json.dumps(raw)[:1000]
              )
          text = f"_Model: `{model}` via Hugging Face Router_\n\n{text}"

          set_review_status("comment")
          out.write_text("## AI Review (Agent)\n\n" + text, encoding="utf-8")
          PY

      - name: Post AI review comment
        if: steps.generate-review.outputs.status == 'comment'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('ai_review.md', 'utf8');
            const pr = context.payload.pull_request.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body
            });
