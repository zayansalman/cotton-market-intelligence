# Enterprise DLC: every push/PR verifies code + produces a pipeline snapshot artifact.
name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GITHUB_REF: ${{ github.ref }}
      GITHUB_SHA: ${{ github.sha }}
      GITHUB_RUN_ID: ${{ github.run_id }}
      GITHUB_WORKFLOW: ${{ github.workflow }}
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_SERVER_URL: ${{ github.server_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Compile & smoke tests
        env:
          PYTHONPATH: "."
        run: |
          python -m compileall -q src
          pytest -q tests/

      - name: Write pipeline snapshot (no secret data)
        env:
          PYTHONPATH: "."
        run: |
          mkdir -p artifacts
          python scripts/write_pipeline_snapshot.py -o artifacts/pipeline_snapshot.json

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-snapshot
          path: artifacts/pipeline_snapshot.json

  docker:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: cmi-notebooks-dashboard:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
