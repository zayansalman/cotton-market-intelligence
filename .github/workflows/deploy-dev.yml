name: Deploy Dev (Vercel)

on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: development
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DEV }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Validate required secrets
        id: guard
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Skipping deploy-dev: missing Vercel secrets (VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID_DEV)."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.guard.outputs.ready == 'true'
        run: npm ci

      - name: Install Vercel CLI
        if: steps.guard.outputs.ready == 'true'
        run: npm install --global vercel@latest

      - name: Validate Vercel authentication token
        id: auth
        if: steps.guard.outputs.ready == 'true'
        run: |
          if vercel whoami --token="$VERCEL_TOKEN" >/dev/null 2>&1; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Skipping deploy-dev: VERCEL_TOKEN is invalid or expired. Rotate the GitHub secret VERCEL_TOKEN."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull Vercel project settings (production env for dev project)
        if: steps.guard.outputs.ready == 'true' && steps.auth.outputs.ready == 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build
        if: steps.guard.outputs.ready == 'true' && steps.auth.outputs.ready == 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt to dev project
        if: steps.guard.outputs.ready == 'true' && steps.auth.outputs.ready == 'true'
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
