name: Deploy Prod (Vercel)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch or sha)"
        required: false
        default: "main"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Validate required secrets
        id: guard
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Skipping deploy-prod: missing Vercel secrets (VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID_PROD)."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.guard.outputs.ready == 'true'
        run: npm ci

      - name: Install Vercel CLI
        if: steps.guard.outputs.ready == 'true'
        run: npm install --global vercel@latest

      - name: Validate Vercel authentication token
        id: auth
        if: steps.guard.outputs.ready == 'true'
        run: |
          if vercel whoami --token="$VERCEL_TOKEN" >/dev/null 2>&1; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Skipping deploy-prod: VERCEL_TOKEN is invalid or expired. Rotate the GitHub secret VERCEL_TOKEN."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull Vercel project settings (production env)
        if: steps.guard.outputs.ready == 'true' && steps.auth.outputs.ready == 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build
        if: steps.guard.outputs.ready == 'true' && steps.auth.outputs.ready == 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt to prod project
        if: steps.guard.outputs.ready == 'true' && steps.auth.outputs.ready == 'true'
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
